name: Feature request
description: Suggest an idea or improvement for LocalMind
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        For **larger ideas** (new subsystems, architectural changes) please open a
        [Discussion](../../discussions) first so we can talk shape before you spend time building it.
        For well-scoped, additive features this template is the right place.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: >
        Describe the use-case or pain point. "I want to be able to..." is a good start.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: >
        How would you like it to work? Rough sketches, screenshots from other apps,
        or pseudocode are all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other approaches you thought about, and why you prefer the proposed one.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Chat / inference
        - Marketplace / model management
        - RAG / knowledge
        - Image generation
        - Voice
        - Phone PWA / mobile
        - LAN server / auth
        - Desktop UI
        - Performance
        - Developer tooling / CI
        - Other
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
    validations:
      required: false
