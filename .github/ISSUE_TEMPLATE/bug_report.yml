name: Bug report
description: Something is not working correctly
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill in as many fields as you can — it speeds up diagnosis a lot.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. What did you expect, and what actually happened?
      placeholder: "Expected: ... Actual: ..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably trigger the bug.
      placeholder: |
        1. Open the app
        2. Go to ...
        3. Click ...
        4. See error
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
        - Windows
        - Phone PWA (iOS Safari)
        - Phone PWA (Android Chrome)
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "e.g. macOS 15.3, Ubuntu 24.04, Windows 11"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "node --version"
    validations:
      required: false

  - type: input
    id: rust-version
    attributes:
      label: Rust version
      placeholder: "rustc --version"
    validations:
      required: false

  - type: textarea
    id: hardware
    attributes:
      label: Hardware info
      description: Copy the hardware summary from Settings → Hardware in the app.
      placeholder: "Apple M1 Pro · 16 GB · Metal"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Terminal output from `npm run tauri dev`, plus anything in
        `~/Library/Application Support/LocalMind/logs/` (macOS).
      render: text
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, screen recordings, related issues, etc.
    validations:
      required: false
